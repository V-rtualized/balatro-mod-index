name: Sync Fork & Build Index
on:
  schedule:
    - cron: '45 * * * *' # Every hour at :45, after upstream's update finishes (~:30)
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['mods/**']

jobs:
  sync:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Merge upstream
        run: |
          git config user.name 'Sync Bot'
          git config user.email 'bot@noreply.github.com'
          git remote add upstream https://github.com/skyline69/balatro-mod-index.git
          git fetch upstream main
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "Already up to date"
          else
            # Merge upstream, keeping ours on conflict (esp. .github/workflows/)
            git merge upstream/main --no-edit -X ours || {
              # Fallback: resolve any remaining conflicts as ours
              conflicted=$(git diff --name-only --diff-filter=U)
              if [ -n "$conflicted" ]; then
                echo "$conflicted" | xargs git checkout --ours --
                git add $conflicted
              fi
              git -c core.editor=true merge --continue
            }
            # Always restore our workflow files (GITHUB_TOKEN can't push workflow changes)
            git checkout HEAD^1 -- .github/workflows/
            git diff --staged --quiet || git commit -m "Preserve fork workflows"
            git push
          fi

      - name: Create issue on conflict/failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-conflict'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Fork sync failed - manual resolution required',
                body: `The automatic sync from \`skyline69/balatro-mod-index\` failed, likely due to merge conflicts.\n\nPlease resolve manually:\n\`\`\`bash\ngit fetch upstream\ngit merge upstream/main\n# resolve conflicts\ngit push\n\`\`\`\n\n[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                labels: ['sync-conflict']
              });
            }

  build-index:
    needs: [sync]
    if: ${{ always() && (needs.sync.result == 'success' || needs.sync.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build compiled index
        run: |
          python3 -c "
          import json, pathlib
          mods = []
          for meta in sorted(pathlib.Path('mods').glob('*/meta.json')):
              data = json.loads(meta.read_text())
              data['_dir'] = meta.parent.name
              data['_has_thumbnail'] = (meta.parent / 'thumbnail.jpg').exists()
              mods.append(data)
          pathlib.Path('index.json').write_text(json.dumps(mods, separators=(',',':')))
          "

      - name: Commit and push index
        run: |
          git config user.name 'Index Bot'
          git config user.email 'bot@noreply.github.com'
          git add index.json
          git diff --cached --quiet || (git commit -m "Update compiled index" && git push)
