name: Sync Fork with Upstream
on:
  schedule:
    - cron: '45 * * * *' # Every hour at :45, after upstream's update finishes (~:30)
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync fork with upstream
        uses: TobKed/github-forks-sync-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          upstream_repository: skyline69/balatro-mod-index
          upstream_branch: main
          target_branch: main
          force: false

      - name: Create issue on conflict/failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'sync-conflict'
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Fork sync failed - manual resolution required',
                body: `The automatic sync from \`skyline69/balatro-mod-index\` failed, likely due to merge conflicts.\n\nPlease resolve manually:\n\`\`\`bash\ngit fetch upstream\ngit merge upstream/main\n# resolve conflicts\ngit push\n\`\`\`\n\n[View workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                labels: ['sync-conflict']
              });
            }
